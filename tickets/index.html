<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="BYUI Mission Statement">
    <meta name="author" content="Nate Jensen">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Tickets</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body>
<main class ="wrapper">
    <h1>Event Ticket</h1>
    <form id="event_ticket">
    <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />
        </div>
    <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />
        </div>
        <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
    </div>
    <div class="field">
        <label for="eventDate">Event Date</label>
        <input id="eventDate" name="eventDate" type="date" required />
    </div>
    <div class="field">
    <label for="travelRange">Type</label>
        <select
            id="guestType"
            name="guestType"
            required
            >
            <option value="">Choose one</option>
            <option value="Student">Student</option>
            <option value="Guest">Guest</option>
        </select>
    </div>

    <div id="studentIdContainer" class="field full" hidden>
        <label for="ID">Student ID</label>
        <input id="studentID" name="SID" type="number" />
    </div>
    <div id="accessCodeContainer" class="field full" hidden>
        <label for="Code">Acess Code</label>
        <input id="accessCode" name="ACode" type="text" />
    </div>

    <button class="full" type="submit">Create Ticket</button>
    <section id="output" aria-live="polite"></section>
</form>
    </main>
</body>
</html>
